name: Native Runtime Smoke

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  native-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux runtime dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install dependencies
        run: npm ci

      - name: Native smoke preflight
        run: npm run -s test:e2e:tauri -- --check

      - name: Native launch smoke (bounded)
        run: TAURI_SMOKE_CMD="xvfb-run -a npm run tauri dev -- --no-watch" npm run -s test:e2e:tauri -- --launch-smoke --timeout=420

